name: Mutation testing

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - cli
          - cursor-runner
          - mcp
          - mcp-server
          - store
          - workflow
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee install.log
          if grep -i "ignored build scripts" install.log; then
            echo "::error::pnpm reported ignored build scripts. Add to pnpm.onlyBuiltDependencies."
            exit 1
          fi

      - name: Mutation testing (@ship/${{ matrix.package }})
        run: pnpm --filter @ship/${{ matrix.package }} exec stryker run
